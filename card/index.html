     css/card.css → --font-display.) -->

<!-- Preload the card-page module chain so name + title + image paint
     the moment the dispatcher hands off to card/index.js. -->
<link rel="modulepreload" href="../js/app.js?v=2">
<link rel="modulepreload" href="../js/engine/dispatch.js">
<link rel="modulepreload" href="../js/engine/card/index.js">
<!-- Card data drives the entire page — preload it parallel to the JS chain
     so the JSON arrives by the time card/index.js calls fetch(). -->
<link rel="preload" as="fetch" href="../content/cards.json" crossorigin="anonymous">

<link rel="stylesheet" href="../css/card.css?v=12">
</head>
<body>

<!-- JS-disabled fallback — the card body is JSON-driven, so without JS
     the page is blank. Show a branded message + email link instead. -->
<noscript>
 <style>
  .dlpk-noscript{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;padding:32px;text-align:center;background:#F8FAFC;font-family:'Inter',system-ui,sans-serif;color:#0F172A;z-index:99999}
  .dlpk-noscript h1{font-size:14px;font-weight:800;letter-spacing:3.6px;color:#0059B3;margin:0}
  .dlpk-noscript p{font-size:14px;line-height:1.6;color:#475569;max-width:380px;margin:0}
  .dlpk-noscript a{display:inline-block;padding:11px 22px;background:#0059B3;color:#FFFFFF;border:1.5px solid #BF9430;border-radius:8px;text-decoration:none;font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase}
 </style>
 <div class="dlpk-noscript">
  <h1>DOLPHLINK</h1>
  <p>This digital business card needs JavaScript to render. Please enable it, or reach out directly.</p>
  <a href="mailto:Salesmarketing@dolphlink.com?cc=Joycetsam@dolphlink.com">Email Sales</a>
 </div>
</noscript>

<!-- ================================================================
     Pre-read loader — identical to main site (index.html). Inline CSS,
     no external dep, FOUC-proof. Removed by engine/card/index.js after
     the card data resolves (or after a 5s safety timeout).
     ================================================================ -->
<style>
 #dlpk-loader{position:fixed;inset:0;z-index:9999;background:#FFFFFF;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px;transition:opacity .4s ease,visibility .4s ease;font-family:'Inter',system-ui,-apple-system,sans-serif}
 #dlpk-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
 #dlpk-loader-ring{width:54px;height:54px;border:3px solid rgba(0,89,179,.12);border-top-color:#0059B3;border-radius:50%;animation:dlpk-spin .9s linear infinite}
 #dlpk-loader-text{font-size:11px;font-weight:800;letter-spacing:4.5px;color:#0059B3;line-height:1}
 @keyframes dlpk-spin{to{transform:rotate(360deg)}}
 @media (prefers-reduced-motion:reduce){#dlpk-loader-ring{animation:none}}
</style>
<div id="dlpk-loader" role="status" aria-label="Loading">
 <div id="dlpk-loader-ring" aria-hidden="true"></div>
 <span id="dlpk-loader-text">DOLPHLINK</span>
</div>

<!-- Global error monitor — same as main site index.html -->
<script>
 window.__dlpkErrors = [];
 window.addEventListener('error', function (e) {
  window.__dlpkErrors.push({
   type: 'error',
   msg: e.message, src: e.filename, line: e.lineno, col: e.colno,
   stack: e.error && e.error.stack || '',
   at: new Date().toISOString()
  });
  console.warn('[dlpk:error]', e.message, e.filename + ':' + e.lineno);
 });
 window.addEventListener('unhandledrejection', function (e) {
  window.__dlpkErrors.push({
   type: 'unhandledrejection',
   msg: (e.reason && e.reason.message) || String(e.reason),
   stack: (e.reason && e.reason.stack) || '',
   at: new Date().toISOString()
  });
  console.warn('[dlpk:reject]', e.reason);
 });
</script>

<!-- Ultra-thin top bar with brand monogram and locale dot -->
<header class="topbar" role="banner">
 <a class="topbar-brand" href="../" aria-label="DOLPHLINK home">
  <span class="monogram" aria-hidden="true">
   <span class="monogram-mark"></span>
   <span class="monogram-mark"></span>
   <span class="monogram-mark"></span>
  </span>
  <span class="topbar-name">DOLPHLINK</span>
 </a>
 <span class="topbar-locale">Singapore</span>
</header>

<main class="card-shell" id="card-shell" aria-busy="true">

 <!-- Real content (revealed by engine/card/index.js after data fetch resolves) -->
 <article class="card" id="card" hidden>

  <!-- Decorative top hairline + diamond -->
  <div class="ornament ornament-top" aria-hidden="true">
   <span class="line"></span>
   <span class="diamond"></span>
   <span class="line"></span>
  </div>

  <!-- Hero: name as the visual centerpiece (no avatar disc — the
       letterpress style of private-banking / law-firm letterheads) -->
  <section class="hero">
   <span class="hero-mark" aria-hidden="true">&#x25C6;</span>
   <h1 id="m-name" class="hero-name">&mdash;</h1>

   <div class="hero-title">
    <span class="rule rule-left" aria-hidden="true"></span>
    <p id="m-title" class="hero-title-text">&mdash;</p>
    <span class="rule rule-right" aria-hidden="true"></span>
   </div>

   <p id="m-meta" class="hero-meta"></p>
  </section>

  <!-- Decorative ornament -->
  <div class="ornament ornament-mid" aria-hidden="true">
   <span class="line"></span>
   <span class="diamond"></span>
   <span class="line"></span>
  </div>

  <!-- Designed name-card image — framed, the visual centerpiece -->
  <section class="card-image-wrap" id="card-image-wrap" hidden>
   <a href="#" id="card-image-link" target="_blank" rel="noopener" aria-label="Open full-size designed name card">
    <span class="frame-corner frame-corner-tl" aria-hidden="true"></span>
    <span class="frame-corner frame-corner-tr" aria-hidden="true"></span>
    <span class="frame-corner frame-corner-bl" aria-hidden="true"></span>
    <span class="frame-corner frame-corner-br" aria-hidden="true"></span>
    <span class="image-glow" aria-hidden="true"></span>
    <img id="card-image" alt="Designed name card" decoding="async" loading="lazy">
    <span class="card-image-zoom" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21l-4.35-4.35"/><circle cx="11" cy="11" r="7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </span>
   </a>
  </section>

  <!-- Three primary actions — labels are forced to two lines so the
       three buttons sit at exactly the same height. -->
  <section class="actions">
   <button type="button" class="act act-primary" id="act-save">
    <span class="act-icon" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
     </svg>
    </span>
    <span class="act-label"><span>Save</span><span>Contact</span></span>
   </button>

   <button type="button" class="act" id="act-copy">
    <span class="act-icon" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
     </svg>
    </span>
    <span class="act-label"><span>Copy</span><span>Link</span></span>
   </button>

   <button type="button" class="act" id="act-share">
    <span class="act-icon" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6" cy="12" r="3"/>
      <circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
     </svg>
    </span>
    <span class="act-label"><span>Share with</span><span>Friends</span></span>
   </button>
  </section>

  <!-- Decorative bottom hairline + diamond -->
  <div class="ornament ornament-bottom" aria-hidden="true">
   <span class="line"></span>
   <span class="diamond"></span>
   <span class="line"></span>
  </div>

 </article>

 <!-- Error state -->
 <article class="error-state" id="error-state" hidden>
  <span class="error-mark" aria-hidden="true">◇</span>
  <h1>Card not found</h1>

  <a class="link-back" href="../">Visit DOLPHLINK</a>
 </article>
