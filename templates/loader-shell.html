 <!-- ================================================================
      Pre-read loader — only renders when JS is available.
      Inline `<script>` immediately injects the loader element so it
      flashes during JS hydration, then main.js removes it once
      content is rendered. If JS is disabled the loader never
      injects, so the page is immediately interactive without any
      "loading" overlay blocking the pre-rendered content.
      Auto-removes via CSS at 4s as a hard safety timeout in case
      main.js doesn't reach the hide() call (e.g. JS error).
      ================================================================ -->
 <style>
  #dlpk-loader{position:fixed;inset:0;z-index:9999;background:#FFFFFF;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:22px;font-family:'Inter',system-ui,-apple-system,sans-serif;animation:dlpk-loader-autohide 0s linear 4s forwards}
  #dlpk-loader.hidden,#dlpk-loader{transition:opacity .4s ease,visibility .4s ease}
  #dlpk-loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
  #dlpk-loader-ring{width:54px;height:54px;border:3px solid rgba(0,89,179,.12);border-top-color:#0059B3;border-radius:50%;animation:dlpk-spin .9s linear infinite}
  #dlpk-loader-text{font-size:11px;font-weight:800;letter-spacing:4.5px;color:#0059B3;line-height:1}
  @keyframes dlpk-spin{to{transform:rotate(360deg)}}
  @keyframes dlpk-loader-autohide{to{opacity:0;visibility:hidden;pointer-events:none}}
  @media (prefers-reduced-motion:reduce){#dlpk-loader-ring{animation:none}}
 </style>
 <script>
  // Inject loader only when JS is on. No-JS users see the
  // pre-rendered content immediately, no overlay. Crawlers + AI
  // agents that don't run JS get the same clean experience.
  document.write('<div id="dlpk-loader" role="status" aria-label="Loading"><div id="dlpk-loader-ring" aria-hidden="true"></div><span id="dlpk-loader-text">DOLPHLINK</span></div>');
 </script>
