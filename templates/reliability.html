 <!-- Reliability Matrix - dedicated section -->
 <section id="r-sec" class="section-row reliability-section">
 <div class="stat-strip-wrap reveal">
 <div class="stat-strip-header">
 <span class="strip-tag" data-key="reliability.headerTag">Reliability Matrix</span>
 <span class="strip-rule"></span>
 </div>
 <!-- Detail panel for reliability stat cards. Lives as a sibling of
      .stat-strip inside .stat-strip-wrap. JS toggles `.open` and
      replaces the inner content when a card is clicked. -->
 <div id="stat-card-detail" class="card-detail" role="dialog" aria-modal="true" aria-hidden="true">
   <button type="button" class="card-detail-close" aria-label="Close detail panel">&times;</button>
   <div class="card-detail-body">
     <div class="card-detail-icon-wrap"><img class="card-detail-icon" alt="" width="96" height="96" loading="lazy" decoding="async" /></div>
     <div class="card-detail-content">
       <span class="card-detail-eyebrow"></span>
       <h3 class="card-detail-title"></h3>
       <div class="card-detail-text"></div>
     </div>
   </div>
 </div>
 <div class="stat-strip" data-render="reliability.stats"><button type="button" class="stat-card" data-stat="sla" data-modal-icon="icon_6" data-modal-eyebrow="99.999%" data-modal-title="Uptime" data-modal-text="Five-nines reliability across geo-redundant points of presence. Engineered for mission-critical communications with independently verified SLA and quarterly third-party attestation." aria-haspopup="dialog"><span class="stat-icon-wrap"></span><span class="stat-meta"><span class="stat-value">99.999%</span><span class="stat-label">Uptime</span><span class="stat-stars" aria-label="Gold standard rating">★★★★★</span></span><span class="click-hint" aria-hidden="true">Click to view more <span class="hint-arrow">&rarr;</span></span></button><button type="button" class="stat-card" data-stat="loc" data-modal-icon="icon_5" data-modal-eyebrow="200+" data-modal-title="Countries" data-modal-text="Routes across 1,000+ tier-1 mobile operators worldwide for unmatched reach and carrier-grade message quality across every region, including last-mile coverage in regulated and emerging markets." aria-haspopup="dialog"><span class="stat-icon-wrap"></span><span class="stat-meta"><span class="stat-value">200+</span><span class="stat-label">Countries</span><span class="stat-stars" aria-label="Gold standard rating">★★★★★</span></span><span class="click-hint" aria-hidden="true">Click to view more <span class="hint-arrow">&rarr;</span></span></button><button type="button" class="stat-card" data-stat="lat" data-modal-icon="icon_10" data-modal-eyebrow="&lt;10s" data-modal-title="Delivery" data-modal-text="SMS reaches recipients in under 10 seconds via tier-1 carrier routes, verified across global benchmarks, audited quarterly, and continuously optimized through real-time route intelligence." aria-haspopup="dialog"><span class="stat-icon-wrap"></span><span class="stat-meta"><span class="stat-value">&lt;10s</span><span class="stat-label">Delivery</span><span class="stat-stars" aria-label="Gold standard rating">★★★★★</span></span><span class="click-hint" aria-hidden="true">Click to view more <span class="hint-arrow">&rarr;</span></span></button><button type="button" class="stat-card" data-stat="ain" data-modal-icon="icon_7" data-modal-eyebrow="AI×H" data-modal-title="Orchestration" data-modal-text="Full agent orchestration with human-in-the-loop AI governance. Bots handle the routine, agents handle the nuance, and seamless handoff returns control to a human reviewer the moment policy or risk thresholds trigger. Built-in migration tooling moves legacy workflows onto next-generation operations on your timeline, with tamper-evident audit trails at every handoff." aria-haspopup="dialog"><span class="stat-icon-wrap"></span><span class="stat-meta"><span class="stat-value">AI×H</span><span class="stat-label">Orchestration</span><span class="stat-stars" aria-label="Gold standard rating">★★★★★</span></span><span class="click-hint" aria-hidden="true">Click to view more <span class="hint-arrow">&rarr;</span></span></button><button type="button" class="stat-card" data-stat="open" data-modal-icon="icon_3" data-modal-eyebrow="98%" data-modal-title="Open Rate" data-modal-text="98% verified open rate on transactional SMS across global tier-1 operators. Time-sensitive OTPs, fraud alerts, and high-priority notifications reach customers within seconds, and they actually read them. Engineered routing prioritises transactional traffic ahead of marketing batches, with quarterly third-party measurement audits." aria-haspopup="dialog"><span class="stat-icon-wrap"></span><span class="stat-meta"><span class="stat-value">98%</span><span class="stat-label">Open Rate</span><span class="stat-stars" aria-label="Gold standard rating">★★★★★</span></span><span class="click-hint" aria-hidden="true">Click to view more <span class="hint-arrow">&rarr;</span></span></button></div>
 </div>
 </section>
