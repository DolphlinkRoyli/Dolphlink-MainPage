 <section class="sme-section sme-cta-section">
   <div class="sme-cta-card">
     <div class="sme-cta-content">
       <span class="sme-section-eyebrow sme-section-eyebrow--light">{{ sme.cta.eyebrow }}</span>
       <h2 class="sme-cta-title">{{ sme.cta.title }}</h2>
       <p class="sme-cta-desc">{{ sme.cta.desc }}</p>
       <div class="sme-cta-actions">
         <a href="mailto:{{ sme.cta.ctaPrimaryMailto }}" class="sme-btn sme-btn--primary">
           <span>{{ sme.cta.ctaPrimary }}</span>
           <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
             <polyline points="9 5 16 12 9 19"/>
           </svg>
         </a>
         <a href="mailto:{{ sme.cta.ctaSecondaryMailto }}" class="sme-btn sme-btn--ghost sme-btn--ghost-light">{{ sme.cta.ctaSecondary }}</a>
       </div>
     </div>
   </div>
 </section>
