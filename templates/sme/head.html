 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>{{ smePage.title }}</title>
 <meta name="description" content="{{ smePage.description }}">
 <meta name="author" content="{{ meta.author }}">
 <meta name="robots" content="index, follow, max-image-preview:large">
 <meta name="theme-color" content="{{ meta.themeColor }}">
 <meta name="application-name" content="{{ meta.appName }}">
 <meta name="format-detection" content="telephone=no">
 <!-- Referrer-Policy: send only origin (not path/query) cross-origin. -->
 <meta name="referrer" content="strict-origin-when-cross-origin">
 <link rel="canonical" href="{{ smePage.canonical }}">

 <!-- Regional intent — page targets ASEAN-wide English market with SG as
      the default. x-default is the fallback for any other locale. -->
 <link rel="alternate" hreflang="en-sg" href="{{ smePage.canonical }}">
 <link rel="alternate" hreflang="en-hk" href="{{ smePage.canonical }}">
 <link rel="alternate" hreflang="en-my" href="{{ smePage.canonical }}">
 <link rel="alternate" hreflang="en-ph" href="{{ smePage.canonical }}">
 <link rel="alternate" hreflang="x-default" href="{{ smePage.canonical }}">

 <link rel="icon" type="image/webp" href="../{{ icons.favicon }}">
 <link rel="apple-touch-icon" href="../{{ icons.appleTouchIcon }}">
 <link rel="manifest" href="../{{ icons.manifest }}">

 <!-- Preload critical CSS for faster first paint (LCP improvement) -->
 <link rel="preload" href="../css/tokens.css?v=1" as="style">
 <link rel="preload" href="../css/sme.css?v=3" as="style">

 <!-- Open Graph — locale forced to en_SG (Singapore-anchored ASEAN page,
      not the global en_US default in seo.json) -->
 <meta property="og:type" content="website">
 <meta property="og:locale" content="en_SG">
 <meta property="og:locale:alternate" content="en_HK">
 <meta property="og:locale:alternate" content="en_MY">
 <meta property="og:locale:alternate" content="en_PH">
 <meta property="og:title" content="{{ smePage.title }}">
 <meta property="og:description" content="{{ smePage.description }}">
 <meta property="og:url" content="{{ smePage.canonical }}">
 <meta property="og:image" content="{{ opengraph.image }}">
 <meta property="og:image:width" content="1200">
 <meta property="og:image:height" content="630">
 <meta property="og:image:alt" content="DOLPHLINK × Lark for SME — carrier-grade SMS, WhatsApp, Voice, Email wired into Lark">
 <meta property="og:site_name" content="{{ opengraph.siteName }}">

 <!-- Twitter -->
 <meta name="twitter:card" content="summary_large_image">
 <meta name="twitter:title" content="{{ smePage.title }}">
 <meta name="twitter:description" content="{{ smePage.description }}">
 <meta name="twitter:image" content="{{ opengraph.image }}">
 <meta name="twitter:image:alt" content="DOLPHLINK × Lark for SME — carrier-grade SMS, WhatsApp, Voice, Email wired into Lark">

 <!-- (Self-hosted by policy — Google Fonts removed. Body falls back
      to the system font stack defined in css/sme.css → --sme-font.) -->

 <link rel="stylesheet" href="../css/tokens.css?v=1">
 <link rel="stylesheet" href="../css/sme.css?v=3">

 <!-- FAQPage — derived from "use cases" + "how it works" sections. Powers
      Google's FAQ rich snippet (the expandable Q&A in search results). -->
 <script type="application/ld+json">
 {
   "@context": "https://schema.org",
   "@type": "FAQPage",
   "@id": "https://dolphlinkroyli.github.io/Dolphlink-MainPage/sme/#faq",
   "mainEntity": [
     {
       "@type": "Question",
       "name": "How long does setup take for an SME?",
       "acceptedAnswer": {
         "@type": "Answer",
         "text": "Most SME onboardings finish in under 10 minutes. Three steps: install the DOLPHLINK app from Lark App Center (~60 seconds), verify your business mobile number with a one-time SMS code (~90 seconds), then send your first message from a pre-localised template (~5 minutes). The slowest step is the SMS verification code — usually 30 seconds."
       }
     },
     {
       "@type": "Question",
       "name": "What does it cost? Is there a minimum commitment?",
       "acceptedAnswer": {
         "@type": "Answer",
         "text": "Three modes. App: free, then pay-as-you-go from SGD $0.04 per SMS. Cloud: SGD $99/month with 5,000 messages included. Platform: from SGD $50,000/year for private deployment. No US$1,000 enterprise minimum, no annual commit on App or Cloud, top up SGD $20 today and pause for a month if you want."
       }
     },
     {
       "@type": "Question",
       "name": "Which languages are supported?",
       "acceptedAnswer": {
         "@type": "Answer",
         "text": "SMS in 繁體中文 / 简体中文 / Tiếng Việt / ไทย / Bahasa Indonesia / Bahasa Melayu / Tagalog deliver as native scripts, not transliterated. Templates are pre-localised for common SME flows. Support team operates in Singapore, Kuala Lumpur, Hong Kong, Bangkok, and Ho Chi Minh City."
       }
     },
     {
       "@type": "Question",
       "name": "Does it integrate with my existing ERP?",
       "acceptedAnswer": {
         "@type": "Answer",
         "text": "Native webhooks for SAP, 用友, 金蝶, Odoo, QuickBooks, Xero — plus any system that can fire a webhook. Three common workflows: ERP order → Lark group notification, Lark Approval → customer SMS/WhatsApp, Lark Calendar → automatic customer reminder. End-to-end latency under 3 seconds."
       }
     },
     {
       "@type": "Question",
       "name": "Is the platform compliant for regulated SMEs?",
       "acceptedAnswer": {
         "@type": "Answer",
         "text": "Yes. PDPA Singapore / Malaysia / Thailand, 个保法, PDPL Vietnam, PDPO Hong Kong, GDPR — every regulation gets checked at the routing layer before the message leaves. Tamper-evident message logs in the same format banks file. ISO 27001 + SOC 2 inherited from our enterprise stack. Quarterly audit reports auto-generated."
       }
     },
     {
       "@type": "Question",
       "name": "What if I outgrow Cloud and need private deployment?",
       "acceptedAnswer": {
         "@type": "Answer",
         "text": "Move up to Platform mode — same backbone, deployed in your VPC / on-prem / sovereign cloud. Your message history, Sender IDs, and Lark integration carry over intact. White-label option available. Implementation typically 4–8 weeks including compliance audit."
       }
     }
   ]
 }
 </script>
