 <section class="sme-section sme-how" id="how">
   <div class="sme-section-head">
     <span class="sme-section-eyebrow">{{ sme.howItWorks.eyebrow }}</span>
     <h2 class="sme-section-title">{{ sme.howItWorks.title }}</h2>
     <p class="sme-section-intro">{{ sme.howItWorks.intro }}</p>
   </div>

   <ol class="sme-how-steps">
{% each sme.howItWorks.steps %}
     <li class="sme-how-step">
       <span class="sme-how-num">{{ this.num }}</span>
       <h3 class="sme-how-title">{{ this.title }}</h3>
       <p class="sme-how-desc">{{ this.desc }}</p>
       <p class="sme-how-time">{{ this.time }}</p>
     </li>
{% endeach %}
   </ol>
 </section>
