 <section class="sme-section sme-benefits" id="lark">
   <div class="sme-section-head">
     <span class="sme-section-eyebrow">{{ sme.benefits.eyebrow }}</span>
     <h2 class="sme-section-title">{{ sme.benefits.title }}</h2>
     <p class="sme-section-intro">{{ sme.benefits.intro }}</p>
   </div>

   <div class="sme-benefit-grid">
{% each sme.benefits.items %}
     <article class="sme-benefit">
       <div class="sme-benefit-icon sme-benefit-icon--{{ this.icon }}">
         <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">{{{ this.iconSvg }}}</svg>
       </div>
       <h3 class="sme-benefit-title">{{ this.title }}</h3>
       <p class="sme-benefit-desc">{{ this.desc }}</p>
       <ul class="sme-benefit-list">
{% each this.bullets %}
         <li>{{ this }}</li>
{% endeach %}
       </ul>
     </article>
{% endeach %}
   </div>
 </section>
