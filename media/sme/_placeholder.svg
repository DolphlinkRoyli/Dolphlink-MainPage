<?xml version="1.0" encoding="UTF-8"?>
<!--
  SME page photo placeholder. Used by .sme-photo-slot CSS class.
  When real photo arrives, replace the .sme-photo-slot div with:
    <img src="media/sme/[name].jpg" alt="..." class="sme-photo">
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 9" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="ph_g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>
  <rect width="16" height="9" fill="url(#ph_g)"/>
</svg>
