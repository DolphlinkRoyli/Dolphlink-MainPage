<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A1628">
<meta name="format-detection" content="telephone=no">

<title>DOLPHLINK · Digital Card</title>
<meta name="description" content="DOLPHLINK digital business card.">

<meta property="og:type" content="profile">
<meta property="og:site_name" content="DOLPHLINK">
<meta property="og:title" content="DOLPHLINK · Digital Card">
<meta property="og:description" content="DOLPHLINK digital business card.">
<meta property="og:image" content="../media/img/og-image.jpg">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" type="image/webp" href="../media/icon/3D/logo.webp">
<link rel="icon" type="image/png" sizes="192x192" href="../media/icon/pwa/icon-192.png">
<link rel="manifest" href="../seo/site.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://drive.google.com">
<link rel="preconnect" href="https://lh3.googleusercontent.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700;800;900&display=swap">

<link rel="stylesheet" href="c.css?v=8">
</head>
<body>

<!-- Ultra-thin top bar with brand monogram and locale dot -->
<header class="topbar" role="banner">
 <a class="topbar-brand" href="../" aria-label="DOLPHLINK home">
  <span class="monogram" aria-hidden="true">
   <span class="monogram-mark"></span>
   <span class="monogram-mark"></span>
   <span class="monogram-mark"></span>
  </span>
  <span class="topbar-name">DOLPHLINK</span>
 </a>
 <span class="topbar-locale">Singapore</span>
</header>

<main class="card-shell" id="card-shell" aria-busy="true">

 <!-- Skeleton state -->
 <div class="skeleton" id="skeleton" aria-hidden="true">
  <div class="sk-avatar"></div>
  <div class="sk-line sk-line-lg"></div>
  <div class="sk-line sk-line-md"></div>
  <div class="sk-img"></div>
 </div>

 <!-- Real content -->
 <article class="card" id="card" hidden>

  <!-- Decorative top hairline + diamond -->
  <div class="ornament ornament-top" aria-hidden="true">
   <span class="line"></span>
   <span class="diamond"></span>
   <span class="line"></span>
  </div>

  <!-- Hero: avatar + name + title -->
  <section class="hero">
   <div class="avatar-orb">
    <span class="orb-ring orb-ring-outer" aria-hidden="true"></span>
    <span class="orb-ring orb-ring-inner" aria-hidden="true"></span>
    <div class="avatar-wrap">
     <img id="avatar-img" alt="" hidden decoding="async">
     <div id="avatar-initials" class="avatar-initials">—</div>
    </div>
   </div>

   <h1 id="m-name" class="hero-name">—</h1>

   <div class="hero-title">
    <span class="rule rule-left" aria-hidden="true"></span>
    <p id="m-title" class="hero-title-text">—</p>
    <span class="rule rule-right" aria-hidden="true"></span>
   </div>

   <p id="m-meta" class="hero-meta"></p>
  </section>

  <!-- Decorative ornament -->
  <div class="ornament ornament-mid" aria-hidden="true">
   <span class="line"></span>
   <span class="diamond"></span>
   <span class="line"></span>
  </div>

  <!-- Designed name-card image — framed, the visual centerpiece -->
  <section class="card-image-wrap" id="card-image-wrap" hidden>
   <a href="#" id="card-image-link" target="_blank" rel="noopener" aria-label="Open full-size designed name card">
    <span class="frame-corner frame-corner-tl" aria-hidden="true"></span>
    <span class="frame-corner frame-corner-tr" aria-hidden="true"></span>
    <span class="frame-corner frame-corner-bl" aria-hidden="true"></span>
    <span class="frame-corner frame-corner-br" aria-hidden="true"></span>
    <span class="image-glow" aria-hidden="true"></span>
    <img id="card-image" alt="Designed name card" decoding="async" loading="lazy">
    <span class="card-image-zoom" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 21l-4.35-4.35"/><circle cx="11" cy="11" r="7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </span>
   </a>
  </section>

  <!-- Three primary actions — labels are forced to two lines so the
       three buttons sit at exactly the same height. -->
  <section class="actions">
   <button type="button" class="act act-primary" id="act-save">
    <span class="act-icon" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
     </svg>
    </span>
    <span class="act-label"><span>Save</span><span>Contact</span></span>
   </button>

   <button type="button" class="act" id="act-copy">
    <span class="act-icon" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
     </svg>
    </span>
    <span class="act-label"><span>Copy</span><span>Link</span></span>
   </button>

   <button type="button" class="act" id="act-share">
    <span class="act-icon" aria-hidden="true">
     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6" cy="12" r="3"/>
      <circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
     </svg>
    </span>
    <span class="act-label"><span>Share with</span><span>Friends</span></span>
   </button>
  </section>

  <!-- Decorative bottom hairline + diamond -->
  <div class="ornament ornament-bottom" aria-hidden="true">
   <span class="line"></span>
   <span class="diamond"></span>
   <span class="line"></span>
  </div>

 </article>

 <!-- Error state -->
 <article class="error-state" id="error-state" hidden>
  <span class="error-mark" aria-hidden="true">◇</span>
  <h1>Card not found</h1>
  <p id="error-msg">This digital business card link is no longer active.</p>
  <a class="link-back" href="../">Visit DOLPHLINK</a>
 </article>

</main>

<footer class="page-footer">
 <span class="footer-mono" aria-hidden="true">D · L</span>
 <p class="footer-line">Baiwu Technology Group · Singapore</p>
 <p class="footer-meta">&copy; <span id="year">2026</span> · <a href="../">dolphlink.com</a></p>
</footer>

<script src="c.js?v=3" defer></script>
</body>
</html>
